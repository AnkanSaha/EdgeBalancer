<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Load Balancer Symbol -->
  <g transform="translate(5, 5)">
    <!-- Central hub -->
    <circle cx="20" cy="20" r="5" fill="url(#logoGradient)" stroke="currentColor" stroke-width="1"/>

    <!-- Top node -->
    <circle cx="20" cy="5" r="3" fill="currentColor" opacity="0.8"/>
    <line x1="20" y1="8" x2="20" y2="15" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>

    <!-- Bottom node -->
    <circle cx="20" cy="35" r="3" fill="currentColor" opacity="0.8"/>
    <line x1="20" y1="32" x2="20" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>

    <!-- Left node -->
    <circle cx="5" cy="20" r="3" fill="currentColor" opacity="0.8"/>
    <line x1="8" y1="20" x2="15" y2="20" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>

    <!-- Right node -->
    <circle cx="35" cy="20" r="3" fill="currentColor" opacity="0.8"/>
    <line x1="32" y1="20" x2="25" y2="20" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="currentColor">
    Edge
  </text>
  <text x="108" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="currentColor" opacity="0.85">
    Balancer
  </text>
</svg>
