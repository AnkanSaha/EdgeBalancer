#:schema node_modules/wrangler/config-schema.json
name = "edgebalancer"
main = ".open-next/worker.js"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
keep_vars = true
preview_urls = false

[vars]
NEXT_PUBLIC_API_URL = "https://apiedge.nexoral.in"

[[rules]]
type = "ESModule"
globs = ["**/*.js", "**/*.mjs"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability.logs]
enabled = false
