<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Load balancer icon: network hub with connections -->
  <!-- Central hub -->
  <circle cx="32" cy="32" r="6" fill="url(#accent)" stroke="#fff" stroke-width="1.5"/>

  <!-- Top server node -->
  <circle cx="32" cy="14" r="4" fill="#fff" opacity="0.9"/>
  <line x1="32" y1="18" x2="32" y2="26" stroke="#fff" stroke-width="2" opacity="0.8"/>

  <!-- Bottom server node -->
  <circle cx="32" cy="50" r="4" fill="#fff" opacity="0.9"/>
  <line x1="32" y1="46" x2="32" y2="38" stroke="#fff" stroke-width="2" opacity="0.8"/>

  <!-- Left server node -->
  <circle cx="14" cy="32" r="4" fill="#fff" opacity="0.9"/>
  <line x1="18" y1="32" x2="26" y2="32" stroke="#fff" stroke-width="2" opacity="0.8"/>

  <!-- Right server node -->
  <circle cx="50" cy="32" r="4" fill="#fff" opacity="0.9"/>
  <line x1="46" y1="32" x2="38" y2="32" stroke="#fff" stroke-width="2" opacity="0.8"/>

  <!-- Diagonal connections for more nodes -->
  <!-- Top-left -->
  <circle cx="18" cy="18" r="3" fill="#fff" opacity="0.7"/>
  <line x1="21" y1="21" x2="27" y2="27" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Top-right -->
  <circle cx="46" cy="18" r="3" fill="#fff" opacity="0.7"/>
  <line x1="43" y1="21" x2="37" y2="27" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom-left -->
  <circle cx="18" cy="46" r="3" fill="#fff" opacity="0.7"/>
  <line x1="21" y1="43" x2="27" y2="37" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom-right -->
  <circle cx="46" cy="46" r="3" fill="#fff" opacity="0.7"/>
  <line x1="43" y1="43" x2="37" y2="37" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
</svg>
